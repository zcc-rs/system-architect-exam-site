<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>系统架构设计师模拟答题学习站</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="data/question-bank.js" defer></script>
    <script src="data/case-guidance.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand-block">
        <p class="eyebrow">系统架构设计师 · 模拟真题训练</p>
        <h1>答题、判分、解析、复盘一体化练习站</h1>
      </div>
      <nav class="mode-tabs" aria-label="训练模式">
        <button class="tab-button is-active" type="button" data-mode="exam">模拟考试</button>
        <button class="tab-button" type="button" data-mode="study">学习刷题</button>
        <button class="tab-button" type="button" data-mode="subjective">案例/论文</button>
      </nav>
    </header>

    <main id="app" class="app-shell" aria-live="polite"></main>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
